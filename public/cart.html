<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Cart | Kanha Mart</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body>

    <!-- =====================================
         HEADER
    ====================================== -->

    <header class="home-header">

        <div class="store-info">

            <h1>🛒 My Cart</h1>

            <p>
                Review your selected items
            </p>

        </div>

        <a href="../index.html"
           class="cart-back-btn">

            ← Back

        </a>

    </header>

    <!-- =====================================
         CART ITEMS
    ====================================== -->

    <section class="section-container">

        <h2 class="section-title">

            Cart Items

        </h2>

        <div id="cartItems">

            <!-- JS will render items -->

        </div>

    </section>

    <!-- =====================================
         ORDER SUMMARY
    ====================================== -->

    <section class="section-container">

        <div class="summary-card">

    <h2>Order Summary</h2>

    <div class="summary-row">

        <span>Subtotal</span>

        <span id="subtotalAmount">
            ₹0
        </span>

    </div>

    <div class="summary-row">

        <span>Delivery Fee</span>

        <span id="deliveryFee">
            ₹0
        </span>

    </div>

    <div class="summary-row total-row">

        <span>Total</span>

        <span id="totalAmount">
            ₹0
        </span>

    </div>

    <button
        id="checkoutBtn"
        class="checkout-btn">

        Proceed To Checkout

    </button>

</div>

    </section>

    <!-- =====================================
         EMPTY CART
    ====================================== -->

    <section
        id="emptyCart"
        class="empty-state hidden">

        <h2>

            🛒 Cart is Empty

        </h2>

        <p>

            Add products to continue shopping

        </p>

        <a href="../index.html">

            Continue Shopping

        </a>

    </section>

    <!-- =====================================
         BOTTOM NAVIGATION
    ====================================== -->

    <nav class="bottom-nav">

        <a
           href="../index.html"
           class="nav-item">

            🏠

            <span>

                Home

            </span>

        </a>

        <a
           href="orders.html"
           class="nav-item">

            📦

            <span>

                Orders

            </span>

        </a>

        <a
           href="cart.html"
           class="nav-item active">

            🛒

            <span>

                Cart

            </span>

        </a>

        <a
           href="profile.html"
           class="nav-item">

            👤

            <span>

                Profile

            </span>

        </a>

    </nav>
    <script type="module" src="../js/cart-page.js"></script>
</body>

</html>
