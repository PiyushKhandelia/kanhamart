<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>My Orders | Kanha Mart</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body>

    <!-- =====================================
         HEADER
    ====================================== -->

    <header class="home-header">

        <div class="store-info">

            <h1>📦 My Orders</h1>

            <p>
                Track your orders
            </p>

        </div>

        <a href="../index.html"
           class="cart-back-btn">

            ← Home

        </a>

    </header>

    <!-- =====================================
         ORDERS LIST
    ====================================== -->

    <section class="section-container">

        <div id="ordersContainer">

            <!-- ORDER CARD -->

            <div class="order-card">

                <div class="order-top">

                    <div>

                        <h3>

                            Order #1001

                        </h3>

                        <p>

                            10 June 2026

                        </p>

                    </div>

                    <span class="status pending">

                        Pending

                    </span>

                </div>

                <div class="order-items">

                    🥛 Milk × 2<br>
                    🍞 Bread × 1

                </div>

                <div class="order-footer">

                    <strong>

                        ₹110

                    </strong>

                    <div>

                        <button class="view-btn">

                            Details

                        </button>

                        <button class="reorder-btn">

                            Reorder

                        </button>

                    </div>

                </div>

            </div>

            <!-- ORDER CARD -->

            <div class="order-card">

                <div class="order-top">

                    <div>

                        <h3>

                            Order #1000

                        </h3>

                        <p>

                            05 June 2026

                        </p>

                    </div>

                    <span class="status delivered">

                        Delivered

                    </span>

                </div>

                <div class="order-items">

                    🍫 Chocolate × 2<br>
                    🧃 Juice × 1

                </div>

                <div class="order-footer">

                    <strong>

                        ₹180

                    </strong>

                    <div>

                        <button class="view-btn">

                            Details

                        </button>

                        <button class="reorder-btn">

                            Reorder

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- =====================================
         EMPTY ORDERS
    ====================================== -->

    <section
        id="emptyOrders"
        class="empty-state hidden">

        <h2>

            📦 No Orders Yet

        </h2>

        <p>

            Start shopping to place your first order

        </p>

        <a href="../index.html">

            Shop Now

        </a>

    </section>

    <!-- =====================================
         BOTTOM NAV
    ====================================== -->

    <nav class="bottom-nav">

        <a
           href="../index.html"
           class="nav-item">

            🏠
            <span>Home</span>

        </a>

        <a
           href="orders.html"
           class="nav-item active">

            📦
            <span>Orders</span>

        </a>

        <a
           href="cart.html"
           class="nav-item">

            🛒
            <span>Cart</span>

        </a>

        <a
           href="profile.html"
           class="nav-item">

            👤
            <span>Profile</span>

        </a>

    </nav>

</body>

</html>
