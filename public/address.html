    ====================================== -->

    <section class="section-container">

        <div class="address-form-card">

            <h2>

                Add New Address

            </h2>

            <input
                type="text"
                id="addressName"
                placeholder="Full Name"
            >

            <input
                type="text"
                id="addressPhone"
                placeholder="Phone Number"
            >

            <textarea
                id="addressLine"
                placeholder="House No, Street, Area"
            ></textarea>

            <input
                type="text"
                id="addressLandmark"
                placeholder="Landmark"
            >

            <input
                type="text"
                id="addressCity"
                placeholder="City"
            >

            <input
                type="text"
                id="addressPincode"
                placeholder="Pincode"
            >

            <button id="saveAddressBtn">

                Save Address

            </button>

        </div>

    </section>
